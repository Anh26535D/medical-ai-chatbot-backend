version: '3.8'

services:
  app:
    image: medical-iot-backend:latest
    container_name: medical_iot_backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GIN_MODE=release
      - MONGODB_URI=mongodb://mongo:27017
      - REDIS_ADDR=redis:6379
      - MQTT_BROKER_URI=tcp://emqx:1883
      - FIREBASE_DATABASE_URL=${FIREBASE_DATABASE_URL}
      - FIREBASE_KEY_PATH=/app/firebase-adminsdk.json
      - JWT_SECRET=${JWT_SECRET}
      - MQTT_WORKER_SECRET=${MQTT_WORKER_SECRET}
    volumes:
      - ./firebase-adminsdk.json:/app/firebase-adminsdk.json:ro
    depends_on:
      - mongo
      - redis
      - emqx
    restart: always

  mongo:
    image: mongo:6.0
    container_name: medical_iot_mongo
    volumes:
      - mongo_data:/data/db
    restart: always

  redis:
    image: redis:7.0-alpine
    container_name: medical_iot_redis
    volumes:
      - redis_data:/data
    restart: always

  emqx:
    image: emqx/emqx:5.3.0
    container_name: medical_iot_emqx
    ports:
      - "1883:1883"       # MQTT TCP port
      - "8883:8883"       # MQTT over TLS port
      - "8083:8083"       # MQTT WebSocket port
      - "18083:18083"     # Dashboard web port
    environment:
      # HTTP Authentication configuration
      - EMQX_AUTHENTICATION__1__MECHANISM=password_based
      - EMQX_AUTHENTICATION__1__BACKEND=http
      - EMQX_AUTHENTICATION__1__METHOD=post
      - EMQX_AUTHENTICATION__1__URL=http://app:8080/api/v1/mqtt/auth
      - EMQX_AUTHENTICATION__1__HEADERS__CONTENT_TYPE=application/json
      - EMQX_AUTHENTICATION__1__BODY__CLIENTID=$${clientid}
      - EMQX_AUTHENTICATION__1__BODY__USERNAME=$${username}
      - EMQX_AUTHENTICATION__1__BODY__PASSWORD=$${password}
      # HTTP Authorization (ACL) configuration
      - EMQX_AUTHORIZATION__SOURCES__1__TYPE=http
      - EMQX_AUTHORIZATION__SOURCES__1__METHOD=post
      - EMQX_AUTHORIZATION__SOURCES__1__URL=http://app:8080/api/v1/mqtt/acl
      - EMQX_AUTHORIZATION__SOURCES__1__HEADERS__CONTENT_TYPE=application/json
      - EMQX_AUTHORIZATION__SOURCES__1__BODY__CLIENTID=$${clientid}
      - EMQX_AUTHORIZATION__SOURCES__1__BODY__USERNAME=$${username}
      - EMQX_AUTHORIZATION__SOURCES__1__BODY__TOPIC=$${topic}
      - EMQX_AUTHORIZATION__SOURCES__1__ACTION=$${action}
      # TLS Configuration
      - EMQX_LISTENERS__SSL__DEFAULT__BIND=8883
      - EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CACERTFILE=/opt/emqx/etc/certs/ca.crt
      - EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CERTFILE=/opt/emqx/etc/certs/server.crt
      - EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__KEYFILE=/opt/emqx/etc/certs/server.key
      - EMQX_LISTENERS__WSS__DEFAULT__ENABLE=false
    volumes:
      - emqx_data:/opt/emqx/data
      - ./certs:/opt/emqx/etc/certs:ro
    restart: always

volumes:
  mongo_data:
  redis_data:
  emqx_data:
