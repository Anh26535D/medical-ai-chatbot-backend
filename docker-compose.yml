version: '3.8'

services:
  app:
    build: .
    container_name: medical_iot_backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GIN_MODE=release
      - MONGODB_URI=mongodb://mongo:27017
      - REDIS_ADDR=redis:6379
      - MQTT_BROKER_URI=tcp://emqx:1883
    depends_on:
      - mongo
      - redis
      - emqx
    restart: always

  mongo:
    image: mongo:6.0
    container_name: medical_iot_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  redis:
    image: redis:7.0-alpine
    container_name: medical_iot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  emqx:
    image: emqx/emqx:5.3.0
    container_name: medical_iot_emqx
    ports:
      - "1883:1883"       # MQTT TCP port
      - "8083:8083"       # MQTT WebSocket port
      - "18083:18083"     # Dashboard web port
    volumes:
      - emqx_data:/opt/emqx/data
    restart: always

volumes:
  mongo_data:
  redis_data:
  emqx_data:
